personality = "pragmatic"
model = "gpt-5.5"
approval_policy = "on-request"

[features]
multi_agent = true

[agents]
max_threads = 4
max_depth = 1

# Keep local role config aligned with runtime-supported agent types.
[agents.explorer]
description = "Read-only analysis and review for architecture, dependency, and risk checks."
config_file = "agents/explorer.toml"

[agents.worker]
description = "Implementation agent scoped to one package or one non-overlapping write set."
config_file = "agents/worker.toml"

[mcp_servers.ark-ui]
command = "npx"
args = ["-y", "@ark-ui/mcp"]
enabled = true

[mcp_servers.figma-desktop-local]
url = "http://127.0.0.1:3845/mcp"
enabled = true