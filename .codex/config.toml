personality = "pragmatic"

model = "gpt-5.6-sol"
model_reasoning_effort = "medium"

approval_policy = "on-request"
sandbox_mode = "workspace-write"

[agents]
max_threads = 4
max_depth = 1

[mcp_servers.ark-ui]
command = "npx"
args = ["-y", "@ark-ui/mcp"]
enabled = true

[mcp_servers.figma-desktop-local]
url = "http://127.0.0.1:3845/mcp"
enabled = true